<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma; background: #f4f6f9; margin: 0;}
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px;}
        h1 { color: #1a73e8; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        input[type="text"], input[type="password"], select { width: 100%; padding: 12px; margin: 8px 0 20px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;}
        button { background: #1a73e8; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px;}
        .btn-danger { background: #dc3545; } .btn-success { background: #28a745; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px;}
        .nav-btn { background: #eee; color: #333; } .nav-btn.active { background: #1a73e8; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f2f2f2; color: #333; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; } .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div align="center"><img id="main-logo" src="https://i.postimg.cc/h4Q0J4Bz/LOGO3_(2).png" style="max-height:100px; margin-top: 20px;"></div>
    <div class="container" id="login-section">
        <h1 id="main-title">الدخول للإدارة</h1>
        <input type="text" id="adminUser" placeholder="اسم المستخدم">
        <input type="password" id="adminPass" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
    </div>

    <div class="container" id="dashboard-section" style="display: none;">
        <div class="nav-tabs no-print">
            <button class="nav-btn active" id="tab-quizzes" onclick="switchTab('quizzes')">بنوك الأسئلة</button>
            <button class="nav-btn" id="tab-results" onclick="switchTab('results')">أرشيف النتائج</button>
        </div>
        <div id="quizzes-view">
            <button class="btn-success" onclick="showCreateForm()">+ مسابقة جديدة</button>
            <div id="quizzes-list" style="margin-top: 20px;"></div>
        </div>
        <div id="results-view" style="display: none;"><div id="results-list"></div></div>
    </div>

    <div class="container" id="create-section" style="display: none;">
        <h1>إعدادات اللعبة</h1>
        <label>الاسم:</label> <input type="text" id="quizTitle">
        <label>الخلفية:</label> <select id="quizTheme"><option value="#ffffff">أبيض</option> <option value="#252525">داكن</option></select>
        <div id="questions-container"></div>
        <button onclick="addQuestionField()">+ إضافة سؤال</button>
        <button class="btn-success" onclick="saveQuiz()">حفظ اللعبة</button>
        <button class="btn-danger" onclick="cancelCreate()">إلغاء</button>
    </div>

    <div class="container" id="print-area" style="display: none;">
        <button class="no-print" onclick="closePrintView()">رجوع</button>
        <button class="btn-success no-print" onclick="window.print()">🖨️ حفظ كـ PDF</button>
        <div id="print-content" style="margin-top: 20px;"></div>
    </div>

    <script>
        const socket = io(); let questionCount = 0; let allResults = [];
        function login() { socket.emit('adminLogin', { username: document.getElementById('adminUser').value.trim(), password: document.getElementById('adminPass').value.trim() }); }
        socket.on('adminAuthFailed', () => alert("اسم المستخدم أو كلمة المرور خاطئة"));
        socket.on('adminAuthSuccess', (data) => { 
            if(data.settings) { document.getElementById('main-logo').src = data.settings.logo; document.getElementById('main-title').innerText = data.settings.title; document.title = data.settings.title; }
            document.getElementById('login-section').style.display = 'none'; document.getElementById('dashboard-section').style.display = 'block'; allResults = data.pastResults || []; renderQuizzes(data.quizzes); renderResults(); 
        });
        socket.on('quizzesUpdated', (quizzes) => { renderQuizzes(quizzes); cancelCreate(); });
        socket.on('resultsUpdated', (results) => { allResults = results; renderResults(); });

        function switchTab(tab) {
            document.getElementById('tab-quizzes').classList.remove('active'); document.getElementById('tab-results').classList.remove('active'); document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('quizzes-view').style.display = tab === 'quizzes' ? 'block' : 'none'; document.getElementById('results-view').style.display = tab === 'results' ? 'block' : 'none';
        }

        function renderQuizzes(quizzes) {
            const list = document.getElementById('quizzes-list'); list.innerHTML = '';
            quizzes.forEach(q => { list.innerHTML += `<div style="padding:15px; border:1px solid #ddd; margin-bottom:10px; display:flex; justify-content:space-between;"><strong>${q.title}</strong> <button class="btn-danger" onclick="socket.emit('deleteQuiz', '${q.id}')">حذف</button></div>`; });
        }

        function renderResults() {
            const list = document.getElementById('results-list'); list.innerHTML = '';
            if(allResults.length === 0) list.innerHTML = '<p>لا توجد نتائج.</p>';
            allResults.slice().reverse().forEach(res => { list.innerHTML += `<div style="padding:15px; border:1px solid #ddd; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;"><div><strong>${res.title}</strong><br><small>${res.date}</small></div><button onclick="viewResult(${res.id})">عرض</button></div>`; });
        }

        function viewResult(id) {
            const res = allResults.find(r => r.id === id); if(!res) return;
            document.getElementById('dashboard-section').style.display = 'none'; document.getElementById('print-area').style.display = 'block';
            let html = `<h2>${res.title}</h2><p>${res.date}</p><table><tr><th>المركز</th><th>الاسم</th><th>النقاط</th></tr>`;
            res.leaderboard.forEach((p, index) => { html += `<tr><td>${index + 1}</td><td>${p.name}</td><td>${p.score}</td></tr>`; });
            html += `</table>`; document.getElementById('print-content').innerHTML = html;
        }

        function closePrintView() { document.getElementById('print-area').style.display = 'none'; document.getElementById('dashboard-section').style.display = 'block'; }
        function showCreateForm() { document.getElementById('dashboard-section').style.display = 'none'; document.getElementById('create-section').style.display = 'block'; document.getElementById('questions-container').innerHTML = ''; questionCount = 0; addQuestionField(); }
        function cancelCreate() { document.getElementById('create-section').style.display = 'none'; document.getElementById('dashboard-section').style.display = 'block'; }

        function addQuestionField() {
            questionCount++; const div = document.createElement('div'); div.className = 'question-block';
            div.innerHTML = `<label>السؤال ${questionCount}:</label> <input type="text" id="q-${questionCount}-text"><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;"><div style="border-top: 4px solid #e21b3c; padding: 10px; border: 1px solid #ddd;"><input type="text" id="q-${questionCount}-opt0" placeholder="أ"><label><input type="radio" name="ans-${questionCount}" value="0" checked> صحيحة</label></div><div style="border-top: 4px solid #1368ce; padding: 10px; border: 1px solid #ddd;"><input type="text" id="q-${questionCount}-opt1" placeholder="ب"><label><input type="radio" name="ans-${questionCount}" value="1"> صحيحة</label></div><div style="border-top: 4px solid #d89e00; padding: 10px; border: 1px solid #ddd;"><input type="text" id="q-${questionCount}-opt2" placeholder="ج"><label><input type="radio" name="ans-${questionCount}" value="2"> صحيحة</label></div><div style="border-top: 4px solid #26890c; padding: 10px; border: 1px solid #ddd;"><input type="text" id="q-${questionCount}-opt3" placeholder="د"><label><input type="radio" name="ans-${questionCount}" value="3"> صحيحة</label></div></div><div style="margin-top:10px;"><label>دبل نقاط؟</label> <select id="q-${questionCount}-double"><option value="false">لا</option><option value="true">نعم</option></select></div>`;
            document.getElementById('questions-container').appendChild(div);
        }

        function saveQuiz() {
            const title = document.getElementById('quizTitle').value; const theme = document.getElementById('quizTheme').value; const questions = [];
            for(let i = 1; i <= questionCount; i++) {
                const qText = document.getElementById(`q-${i}-text`).value;
                if(qText) { const selectedAns = document.querySelector(`input[name="ans-${i}"]:checked`).value; questions.push({ question: qText, options: [document.getElementById(`q-${i}-opt0`).value, document.getElementById(`q-${i}-opt1`).value, document.getElementById(`q-${i}-opt2`).value, document.getElementById(`q-${i}-opt3`).value], answer: parseInt(selectedAns), isDouble: document.getElementById(`q-${i}-double`).value === "true" }); }
            }
            socket.emit('saveNewQuiz', { title, theme, questions });
        }
    </script>
</body>
</html>
